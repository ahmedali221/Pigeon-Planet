name: pigeon_planet
description: "Pigeon Planet - منصة مزادات الحمام الزاجل"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7

  # Dependency Injection
  get_it: ^8.0.3

  # Functional Error Handling
  dartz: ^0.10.1

  # Network
  dio: ^5.7.0
  crypto: ^3.0.6
  flutter_secure_storage: ^9.0.0

  # Camera + sensors for Zajel scanner
  camera: ^0.11.0+2
  sensors_plus: ^7.0.0
  path_provider: ^2.1.4

  # Video processing + playback
  ffmpeg_kit_flutter_new: ^4.2.1
  video_player: ^2.9.2

  # Image Picker (for ID / tax card photo uploads)
  image_picker: ^1.1.2

  # Runtime permissions
  permission_handler: ^11.4.0

  # QR Code generation (Pigeon Digital ID)
  qr_flutter: ^4.1.0

  # QR Code scanning (public bird lookup via scanned bird card)
  mobile_scanner: ^5.2.0

  # Fonts
  google_fonts: ^6.2.1

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
