name: pigeon_planet
description: "Pigeon Planet - منصة مزادات الحمام الزاجل"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7

  # Dependency Injection
  get_it: ^8.0.3

  # Functional Error Handling
  dartz: ^0.10.1

  # Network
  dio: ^5.7.0
  flutter_secure_storage: ^9.0.0

  # Image Picker (for ID / tax card photo uploads)
  image_picker: ^1.1.2

  # QR Code generation (Pigeon Digital ID)
  qr_flutter: ^4.1.0

  # Fonts
  google_fonts: ^6.2.1

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
